<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TASAN WIN</title>

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:gold;
flex-direction:column;
}

.logo{
font-size:40px;
font-weight:bold;
animation:zoom 1.5s infinite;
}

.loader{
width:250px;
height:8px;
background:#333;
border-radius:10px;
margin-top:30px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:gold;
animation:load 3s linear forwards;
}

@keyframes load{
0%{width:0;}
100%{width:100%;}
}

@keyframes zoom{
50%{transform:scale(1.1);}
}

</style>

</head>

<body>

<div class="logo">👑 TASAN WIN</div>

<h2>Loading...</h2>

<div class="loader">
<div class="bar"></div>
</div>

<script>

setTimeout(function(){

window.location.href="index.html";

},3000);

</script>

</body>
</html>
